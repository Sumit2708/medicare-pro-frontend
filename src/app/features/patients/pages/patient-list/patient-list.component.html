  <app-search-box
    placeholder="Search doctors..."
    (search)="applyFilter($event)"
  >
  </app-search-box>

<mat-card>
  <div class="table-container">
    <div *ngIf="dataSource.data.length === 0" class="empty-state">
      <mat-icon>info</mat-icon>
      <p>No patients found</p>
    </div>

    <div
      *ngIf="dataSource.data.length > 0 && dataSource.filteredData.length === 0"
      class="empty-state"
    >
      <mat-icon>search_off</mat-icon>
      <p>No patients match your search</p>
    </div>

    <table
      mat-table
      [dataSource]="dataSource"
      class="mat-elevation-z8"
      *ngIf="dataSource.filteredData.length > 0"
      matSort
    >
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let patient; let i = index">
          {{ paginator.pageIndex * paginator.pageSize + i + 1 }}
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>

      <!-- Age Column -->
      <ng-container matColumnDef="age">
        <th mat-header-cell *matHeaderCellDef>Age</th>
        <td mat-cell *matCellDef="let element">{{ element.age }}</td>
      </ng-container>

      <!-- Gender Column -->

      <ng-container matColumnDef="gender">
        <th mat-header-cell *matHeaderCellDef>Gender</th>
        <td mat-cell *matCellDef="let element">{{ element.gender }}</td>
      </ng-container>

      <ng-container matColumnDef="mobile">
        <th mat-header-cell *matHeaderCellDef>Mobile</th>
        <td mat-cell *matCellDef="let element">{{ element.mobile }}</td>
      </ng-container>

      <!-- Actions Column -->

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button
            mat-button
            color="primary"
            (click)="navToEditPatient(element)"
          >
            Edit
          </button>
          <button mat-button color="warn" (click)="deletePatient(element.id)">
            Delete
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let element">{{ element.status }}</td>
      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="[
          'id',
          'name',
          'age',
          'gender',
          'mobile',
          'actions',
          'status',
        ]"
      ></tr>
      <tr
        mat-row
        *matRowDef="
          let row;
          columns: [
            'id',
            'name',
            'age',
            'gender',
            'mobile',
            'actions',
            'status',
          ]
        "
      ></tr>
    </table>
  </div>
  <mat-paginator [pageSize]="5"></mat-paginator>
</mat-card>
