<app-page-header
    title="Create Invoice"
    subtitle="Generate invoice for completed appointment"
    [showButton]="false">
</app-page-header>

<mat-card class="invoice-card p-4">

<form [formGroup]="invoiceForm">

    <h3 class="my-4">Appointment Information</h3>

    <div class="row">

        <mat-form-field appearance="outline">

            <mat-label>Patient</mat-label>

            <input
                matInput
                formControlName="patientName">

        </mat-form-field>

        <mat-form-field appearance="outline">

            <mat-label>Doctor</mat-label>

            <input
                matInput
                formControlName="doctorName">

        </mat-form-field>

    </div>

    <div class="row ">

        <mat-form-field appearance="outline">

            <mat-label>Appointment Date</mat-label>

            <input
                matInput
                formControlName="appointmentDate">

        </mat-form-field>

    </div>

    <h3 class="my-4">Billing Information</h3>

    <div class="row ">

        <mat-form-field appearance="outline">

            <mat-label>Consultation Fee</mat-label>

            <input
                matInput
                type="number"
                formControlName="consultationFee">

        </mat-form-field>

        <mat-form-field appearance="outline">

            <mat-label>Discount</mat-label>

            <input
                matInput
                type="number"
                formControlName="discount">

        </mat-form-field>

    </div>

    <div class="row">

        <mat-form-field appearance="outline">

            <mat-label>GST</mat-label>

            <input
                matInput
                formControlName="gst">

        </mat-form-field>

        <mat-form-field appearance="outline">

            <mat-label>Total</mat-label>

            <input
                matInput
                formControlName="total"
                >

        </mat-form-field>

    </div>

    <div class="row">

        <mat-form-field appearance="outline">

            <mat-label>Payment Method</mat-label>

            <mat-select formControlName="paymentMethod">

                <mat-option value="Cash">Cash</mat-option>

                <mat-option value="UPI">UPI</mat-option>

                <mat-option value="Card">Card</mat-option>

                <mat-option value="Insurance">Insurance</mat-option>

            </mat-select>

        </mat-form-field>

        <mat-form-field appearance="outline">

            <mat-label>Payment Status</mat-label>

            <mat-select formControlName="paymentStatus">

                <mat-option value="Pending">Pending</mat-option>

                <mat-option value="Paid">Paid</mat-option>

                <mat-option value="Cancelled">Cancelled</mat-option>

            </mat-select>

        </mat-form-field>

    </div>

    <div class="actions">

        <button
            mat-stroked-button
            routerLink="/billing">

            Cancel

        </button>

        <button
            mat-raised-button
            color="primary">

            Generate Invoice

        </button>

    </div>

</form>

</mat-card>
