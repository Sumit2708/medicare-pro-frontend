<!-- Create a login form with remeber me and forget password -->

<div class="login-container">
    <mat-card class="main-card mat-elevation-z4 m-2 p-5">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div  class="form-group">
                <mat-form-field
                 appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" />
                </mat-form-field>
            </div>
            <div  class="form-group">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" formControlName="password" />
                </mat-form-field>
            </div>
            <div  class="form-group">
                <mat-checkbox class="remember-me" formControlName="rememberMe">Remember me</mat-checkbox>
            </div>
            <div class="mt-3 mb-3 d-flex justify-content-center  form-group">
                <button mat-raised-button color="primary" class="login-button" type="submit">Login</button>
            </div>

            <mat-divider></mat-divider>

            <div class="mt-3 mb-3 d-flex justify-content-center"class="mt-3 mb-3 text-center">
                <!-- Forget password -->
                <a routerLink="/auth/forgot-password" class="forgot-password" color="primary">Forget Password</a>
            </div>
        </form>
    </mat-card>
</div>
