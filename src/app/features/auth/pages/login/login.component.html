<!-- Create a login form with remeber me and forget password -->

<div class="login-container">
  <mat-card class="main-card mat-elevation-z4">
    <div class="logo-section">
      <!-- <mat-icon class="logo">local_hospital</mat-icon>  -->

      <h1 class="text-center">MediCare Pro</h1>

      <p class="text-center">Clinic Management System</p>
    </div>

    <h2 class="text-center">Welcome Back</h2>

    <p class="subtitle text-center">Please sign in to continue</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
        </mat-form-field>
      </div>
      <div class="form-group">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
          >
            <mat-icon>
              {{ hidePassword ? "visibility_off" : "visibility" }}
            </mat-icon>
          </button>
        </mat-form-field>
      </div>
      <div class="form-group">
        <mat-checkbox class="remember-me" formControlName="rememberMe"
          >Remember me</mat-checkbox
        >
      </div>
      <div class="mt-3 mb-3 d-flex justify-content-center form-group">
        <button
          mat-raised-button
          color="primary"
          class="login-button"
          type="submit"
        >
          Login
        </button>
      </div>

     

      <div
        class="mt-1 mb-3 text-center"
      >
        <!-- Forget password -->
        <a
          routerLink="/auth/forgot-password"
          class="forgot-password"
          color="primary"
          >Forget Password</a
        >
      </div>
    </form>
     <mat-divider class="mt-3"></mat-divider>
    <p class="version text-center fs12">Version 1.0.0</p>
  </mat-card>
</div>
