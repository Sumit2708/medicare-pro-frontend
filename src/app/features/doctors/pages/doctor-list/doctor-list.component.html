<div class="page-container">
  <div>
    <h3>Doctors</h3>
  </div>
</div>

<div class="page-header">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search Doctor</mat-label>
    <input
      matInput
      (keyup)="applyFilter($event)"
      placeholder="Search doctors"
    />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>
   <button mat-raised-button color="primary" (click)="navToAddDoctor()">
      Add Doctor
    </button>
</div>

<mat-card>
  <div class="table-container">
    <div *ngIf="dataSource.data.length === 0" class="empty-state">
      <mat-icon>info</mat-icon>
      <p>No doctors found</p>
    </div>

    <div
      *ngIf="dataSource.data.length > 0 && dataSource.filteredData.length === 0"
      class="empty-state"
    >
      <mat-icon>search_off</mat-icon>
      <p>No doctors match your search</p>
    </div>

    <table
      mat-table
      [dataSource]="dataSource"
      *ngIf="dataSource.filteredData.length > 0"
      matSort
    >
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let doctor; let i = index">
          {{ paginator.pageIndex * paginator.pageSize + i + 1 }}
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let doctor">{{ doctor.name }}</td>
      </ng-container>

      <ng-container matColumnDef="specialization">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Specialization
        </th>
        <td mat-cell *matCellDef="let doctor">{{ doctor.specialization }}</td>
      </ng-container>

      <ng-container matColumnDef="fee">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Fee</th>
        <td mat-cell *matCellDef="let doctor">{{ doctor.fee }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-column">
          Actions
        </th>

        <td mat-cell *matCellDef="let doctor" class="actions-column">
          <button mat-button color="primary" (click)="navToEditDoctor(doctor)">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-button color="warn" (click)="deleteDoctor(doctor.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
        <td mat-cell *matCellDef="let doctor">
          <span *ngIf="doctor.status == 'Active'" class="status-active">
            {{ doctor.status }}
          </span>
          <span *ngIf="doctor.status !== 'Active'" class="status-inactive">
            {{ doctor.status }}
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
  <mat-paginator [pageSize]="5"></mat-paginator>
</mat-card>
