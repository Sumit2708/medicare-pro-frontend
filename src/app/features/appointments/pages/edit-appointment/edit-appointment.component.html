<h3>Edit Appointment Form</h3>

<mat-card>
  <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()" class="m-4 p-4">
    <div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Patient</mat-label>
        <mat-select formControlName="patientId">
          <mat-option *ngFor="let patient of patients" [value]="patient.id">
            {{ patient.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Doctor</mat-label>
        <mat-select formControlName="doctorId">
          <mat-option *ngFor="let doctor of doctors" [value]="doctor.id">
            {{ doctor.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div>
      <mat-form-field>
        <mat-label>Appointment Date</mat-label>

        <input matInput
          [matDatepicker]="datePicker"
          formControlName="date"
          [matDatepickerFilter]="myFilter"
          [min]="minDate"
          [max]="maxDate" />

        <mat-datepicker-toggle
          matSuffix
          [for]="datePicker"
        ></mat-datepicker-toggle>

        <mat-datepicker #datePicker></mat-datepicker>
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline">
        <mat-label>Appointment Time</mat-label>

        <mat-select formControlName="time">
          <mat-option *ngFor="let slot of timeSlots" [value]="slot">
            {{ slot }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="">
      <mat-form-field appearance="outline" class="">
        <mat-label>Notes</mat-label>
        <textarea matInput rows="3" formControlName="notes"> </textarea>
        <mat-hint>Optional</mat-hint>
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline" class="full-width mt-4">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option value="Scheduled">Scheduled</mat-option>
          <mat-option value="Completed">Completed</mat-option>
          <mat-option value="Cancelled">Cancelled</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div>
      <button mat-raised-button color="primary" type="submit">Update</button>
    </div>
  </form>
</mat-card>
