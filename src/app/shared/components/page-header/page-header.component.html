<div class="page-header">

    <div class="header-content">

        <h2>

            {{title}}

        </h2>

        <p *ngIf="subtitle">

            {{subtitle}}

        </p>

    </div>

    @if (showButton){<button
        mat-raised-button
        color="primary"
        (click)="onButtonClick()">

        <mat-icon *ngIf="buttonIcon">

            {{buttonIcon}}

        </mat-icon>

        {{buttonLabel}}

    </button>
    }
</div>
