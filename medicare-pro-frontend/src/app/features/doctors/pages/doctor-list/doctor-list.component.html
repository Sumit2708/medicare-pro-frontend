<div class="page-container">
  <div class="page-header">
    <h3>Doctors</h3>
    <button mat-raised-button color="primary">Add Doctor</button>
  </div>
</div>

<mat-card>
  <table mat-table [dataSource]="dataSource" matSort>
    
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
      <td mat-cell *matCellDef="let doctor">{{ doctor.id }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let doctor">{{ doctor.name }}</td>
    </ng-container>

    <ng-container matColumnDef="specialization">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Specialization</th>
      <td mat-cell *matCellDef="let doctor">{{ doctor.specialization }}</td>
    </ng-container>

    <ng-container matColumnDef="fee">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Fee</th>
      <td mat-cell *matCellDef="let doctor">{{ doctor.fee }}</td>
    </ng-container>

    <ng-container matColumnDef="actions" >
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="center-header">Actions</th>
      <td mat-cell *matCellDef="let doctor">
        <button mat-button color="primary">Edit</button>
        <button mat-button color="warn" (click)="deleteDoctor(doctor.id)">
          Delete
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSize]="5"></mat-paginator>
</mat-card>
